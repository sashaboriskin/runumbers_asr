# Tiny config to sanity-check the pipeline locally on Mac (CPU / MPS).
data:
  data_root: data
  train_csv: train/train.csv
  dev_csv: dev/dev.csv
  n_mels: 80

model:
  n_blocks: 2
  d_model: 96
  n_heads: 4
  ff_mult: 2
  conv_kernel: 15
  dropout: 0.0

epochs: 1
batch_size: 4
num_workers: 0
lr: 3.0e-3
warmup_steps: 50
out_dir: runs/smoke
log_every: 5
use_balanced_sampler: false
amp: false
patience: 100
